<app-navbar (searchEvent)="search($event)"></app-navbar>

<!-- SERVICES SECTION -->
<div class="container py-5">

  <!-- TITLE -->
  <div class="text-center mb-5">

    <h2 class="fw-bold text-uppercase">
      Our Services
    </h2>

    <p class="text-muted">
      Professional black & white service provider platform
    </p>

  </div>

  <!-- SERVICE CARDS -->
  <div class="row g-4">

    <div class="col-lg-3 col-md-6" *ngFor="let category of pagination">

      <div class="card border-0 shadow service-card h-100">

        <!-- IMAGE -->
        <div class="overflow-hidden">

          <img
            [src]="'http://127.0.0.1:8000/storage/' + category.image"
            class="card-img-top service-img"
            alt="service image"
          >

        </div>

        <!-- BODY -->
        <div class="card-body d-flex flex-column">

          <h5 class="fw-bold">
            {{ category.serviceName }}
          </h5>

          <p class="text-secondary flex-grow-1">
            {{ category.description }}
          </p>

          <h4 class="fw-bold mb-3">
            ₹{{ category.price }}
          </h4>

          <button
            class="btn btn-dark rounded-pill"
            (click)="bookNow(category)">

            Add Cart

          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- PAGINATION -->
<div
  class="d-flex justify-content-center gap-3 pb-5"
  *ngIf="totalPages > 1">

  <button
    class="btn btn-outline-dark rounded-pill px-4"
    (click)="prePage()">

    Previous

  </button>

  <button
    class="btn btn-dark rounded-pill px-4"
    (click)="nextPage()">

    Next

  </button>

</div>
