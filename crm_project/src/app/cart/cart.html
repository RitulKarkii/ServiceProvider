<app-navbar></app-navbar>
<div class="container mt-4" *ngIf="carts.length > 0">

  <!-- Heading Row -->
  <div class="row fw-bold border-bottom pb-2 mb-3 bg-light p-2 rounded">
    <div class="col">Image</div>
    <div class="col">Service Name</div>
    <div class="col">Phone Number</div>
    <div class="col">Price</div>
    <div class="col">Address</div>
    <div class="col">Status</div>
    <div class="col">Action</div>

  </div>

  <!-- Data Rows -->
  <div
    class="row align-items-center border rounded p-3 mb-3 shadow-sm"
    *ngFor="let cart of carts"
  >

    <div class="col">
      <img
        [src]="'http://127.0.0.1:8000/storage/' + cart.image"
        width="100"
        height="100"
        class="img-fluid rounded"
      >
    </div>

    <div class="col">
      {{ cart.serviceName }}
    </div>

    <div class="col">
      {{ cart.phoneNumber }}
    </div>

    <div class="col">
      ₹ {{ cart.price }}
    </div>

    <div class="col">
      {{ cart.address }}
    </div>

    <div class="col">
      {{ cart.status }}
    </div>

    <div class="col">
      <button class="btn btn-primary" (click)="delete(cart.id)">Delete</button>
    </div>

  </div>

  <div class="d-flex flex-column align-items-end mt-4">
      <h4 class="mt-3">
  Total Price: ₹ {{ getTotalPrice() }}
</h4>

  <button class=" mt-3" (click)="getToPayment()" class="btn btn-primary">
    <a href="payment" class="text-decoration-none text-white">Payment</a>
  </button>
  </div>

</div>

<div *ngIf="!carts.length" class="text-center">
  <h1>No Booking! go for booking <a href="">Click here</a></h1>
</div>
