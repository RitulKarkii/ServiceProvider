<app-navbar (searchEvent)="search($event)">
</app-navbar>

<div class="container-fluid p-0">
  <div class="row">
    <div class="col-sm-12">
      <div>
        <img src="https://media.istockphoto.com/id/1304484797/photo/person-holds-a-smartphone-with-mobile-banking-icons-projection.jpg?s=2048x2048&w=is&k=20&c=c7Razx48XvigCcT03Mx-b9tm-73DAEJbcdpLxf7CKYk="  alt="" style="height:50vh; width:100% ; object-fit:cover;" class="fade-box">
      <img src="" alt="">
      </div>
    </div>
  </div>
</div>
<style>
.fade-box {
  animation: fadeIn 3s;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}
</style>


<div class="container mt-3">

  <div class="row g-3">

    <div class="col-md-3" *ngFor="let category of pagination">

      <div class="card h-100 shadow-sm">

        <img
          [src]="'http://127.0.0.1:8000/storage/' + category.image"
          class="card-img-top"
          alt="image"
          style="height: 200px; object-fit: cover;"
        >

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">
            {{ category.serviceName }}
          </h5>

          <p class="card-text flex-grow-1">
            {{ category.description }}
          </p>

          <h5 class="fw-bold">
            Price: &#8377;{{ category.price }}
          </h5>

          <button
            type="button"
            class="btn btn-primary mt-auto"
            (click)="bookNow(category)">
           Add Cart 
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<div
  class="d-flex justify-content-center gap-2 mt-4"
  *ngIf="totalPages > 1">

  <button
    class="btn btn-outline-primary"
    (click)="prePage()">
    Previous
  </button>

  <button
    class="btn btn-primary"
    (click)="nextPage()">
    Next
  </button>

</div>
